# cx16.cfg - cc65 linker configuration for Commander X16 .prg files
#
# This config produces a standard .prg file with a BASIC stub at $0801
# that auto-runs the program via SYS 2061.
#
# Memory layout:
#   $0000-$00FF  - Zero page (CPU registers, KERNAL/BASIC workspace)
#   $0100-$01FF  - CPU stack
#   $0200-$07FF  - KERNAL/BASIC workspace
#   $0801-$080C  - BASIC stub ("10 SYS 2061")
#   $080D-$9EFF  - Main program (code, data, rodata, BSS)
#   $9F00-$9FFF  - I/O registers (VERA, VIA, YM2151)
#   $A000-$BFFF  - Banked RAM (512KB, 256 banks of 8KB)
#   $C000-$FFFF  - Banked ROM

SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0800;  # 2KB C stack
}

MEMORY {
    # Zero page: usable area after KERNAL/BASIC workspace
    ZP:      type = rw, start = $0022, size = $0060, define = yes;

    # BASIC stub: the 12-byte "10 SYS 2061" line at $0801
    HEADER:  type = ro, start = $0801, size = $000D, file = %O, fill = yes;

    # Main program area: from $080D up to I/O space at $9F00
    MAIN:    type = rw, start = $080D, size = $96F3, file = %O, define = yes;
}

SEGMENTS {
    # Zero page variables
    ZEROPAGE:   load = ZP,     type = zp;

    # BASIC startup stub - auto-generated "10 SYS 2061"
    STARTUP:    load = HEADER, type = ro;

    # Executable code
    CODE:       load = MAIN,   type = ro;

    # Read-only data (strings, lookup tables, etc.)
    RODATA:     load = MAIN,   type = ro;

    # Initialized read-write data
    DATA:       load = MAIN,   type = rw;

    # C runtime init tables
    INIT:       load = MAIN,   type = rw;

    # Block storage segment (uninitialized data, zeroed at startup)
    BSS:        load = MAIN,   type = bss, define = yes;
}
